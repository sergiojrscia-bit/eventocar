title: EventoCar — Documentação
description: Documentação técnica do projeto EventoCar

remote_theme: just-the-docs/just-the-docs

url: "https://sergiojrscia-bit.github.io"
baseurl: "/eventocar"

# Idioma
lang: pt-BR

# Navegação
nav_sort: case_insensitive

# Processador de Markdown
# input: GFM garante que tabelas, listas de tarefas e outros elementos no
# formato usado pelo GitHub sejam interpretados corretamente. Sem isso, o
# kramdown pode falhar em reconhecer tabelas e mostrá-las como texto corrido.
markdown: kramdown
kramdown:
  input: GFM

# Busca
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Rodapé
footer_content: "EventoCar &copy; 2026"

# Plugins necessários para remote_theme funcionar no GitHub Pages
plugins:
  - jekyll-remote-theme

# Excluir arquivos que não são documentação
exclude:
  - node_modules/
  - .next/
  - package.json
  - package-lock.json
  - Makefile
  - "*.ps1"
  - "*.mjs"
